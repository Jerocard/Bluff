<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>참·거짓 : Bluff Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e14;--sf:#16161f;--cb:#1e1e2e;--gold:#c9a84c;--red:#e05252;--green:#52c07a;--text:#e8e6df;--dim:#7a7870;--bdr:#2a2a3a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans KR",sans-serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* TITLE */
#st{align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a1428,var(--bg) 70%);gap:14px;padding:28px 20px;overflow-y:auto;}
.tem{width:70px;height:70px;border:2px solid var(--gold);border-radius:50%;overflow:hidden;animation:glow 3s ease-in-out infinite;flex-shrink:0;}
.tem img{width:100%;height:100%;object-fit:cover;}
@keyframes glow{0%,100%{box-shadow:0 0 20px #c9a84c22;}50%{box-shadow:0 0 50px #c9a84c66;}}
.tmain{font-family:"Black Han Sans",sans-serif;font-size:30px;letter-spacing:3px;color:var(--gold);text-align:center;}
.tsub{font-size:10px;letter-spacing:6px;color:var(--dim);text-align:center;}
.sbox{background:var(--sf);border:1px solid var(--bdr);border-radius:14px;padding:16px;width:100%;max-width:360px;gap:12px;display:flex;flex-direction:column;}
.slbl{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
input[type=text]{background:var(--cb);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:10px 12px;font-size:15px;width:100%;font-family:"Noto Sans KR",sans-serif;}
input:focus{outline:none;border-color:var(--gold);}
.row{display:flex;gap:8px;align-items:center;}
.nbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bdr);background:var(--cb);color:var(--text);font-size:18px;cursor:pointer;}
.nval{font-family:"Black Han Sans",sans-serif;font-size:22px;color:var(--gold);min-width:30px;text-align:center;}
.plist{display:flex;flex-direction:column;gap:6px;}
select{background:var(--cb);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;width:100%;}

/* BUTTONS */
.btn{background:var(--gold);color:#1a1000;border:none;border-radius:10px;padding:12px 18px;font-size:15px;font-weight:900;font-family:"Noto Sans KR",sans-serif;cursor:pointer;width:100%;letter-spacing:1px;}
.btn:active{opacity:.8;}
.btn.sec{background:transparent;border:1px solid var(--bdr);color:var(--text);}
.btn.red{background:var(--red);color:#fff;}
.btn.grn{background:var(--green);color:#111;}
.btn:disabled{opacity:.35;pointer-events:none;}
.brow{display:flex;gap:8px;}
.brow .btn{flex:1;}

/* GAME */
#sg{overflow-y:auto;}
.gtop{background:var(--sf);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.gtit{font-family:"Black Han Sans",sans-serif;font-size:15px;color:var(--gold);flex:1;}
.rlbl{font-size:11px;color:var(--dim);}
.timer{font-family:"Black Han Sans",sans-serif;font-size:17px;min-width:26px;text-align:center;}
.timer.warn{color:var(--red);animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.gi{display:flex;flex-direction:column;gap:10px;padding:10px 12px;}

/* OPPONENT */
.opbox{background:var(--sf);border:1px solid var(--bdr);border-radius:10px;padding:10px;}
.ophead{font-size:11px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:6px;}
.opcards{display:flex;gap:3px;flex-wrap:wrap;}
.cback{width:40px;height:56px;border-radius:6px;overflow:hidden;border:1px solid #3a3a5a;}
.cback img{width:100%;height:100%;object-fit:cover;}

/* TABLE */
.tbox{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:10px;padding:10px;}
.tlbl{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;}
.tcards{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;}
.tclaim{font-size:13px;color:var(--text);background:var(--cb);border-radius:6px;padding:6px 10px;}

/* LOG */
.logbox{display:flex;flex-direction:column;gap:2px;}
.loge{font-size:12px;color:var(--dim);padding:2px 0;}
.loge.act{color:var(--text);}
.loge.bl{color:var(--red);}
.loge.wi{color:var(--green);}

/* MY ZONE */
.mybox{background:var(--sf);border:1px solid var(--bdr);border-radius:10px;padding:10px;flex-shrink:0;}
.myhead{font-size:11px;color:var(--dim);display:flex;justify-content:space-between;margin-bottom:6px;}
.mycoins{color:var(--gold);}
.hand{display:flex;gap:4px;overflow-x:auto;padding:2px 0;scrollbar-width:none;}
.hand::-webkit-scrollbar{display:none;}
.card{width:54px;height:76px;border-radius:7px;overflow:hidden;border:2px solid #3a3a5a;cursor:pointer;transition:transform .12s,border-color .12s;flex-shrink:0;}
.card img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
.card.sel{border-color:var(--gold);transform:translateY(-10px);}
.seli{font-size:12px;color:var(--dim);text-align:center;margin-top:5px;min-height:16px;}

/* ACTIONS */
.actbox{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.numsel{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:8px;background:var(--sf);border:1px solid var(--bdr);border-radius:10px;}
.nsbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--bdr);background:var(--cb);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;}
.nsbtn.on{background:var(--gold);color:#1a1000;border-color:var(--gold);}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:#000a;z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.mbox{background:var(--sf);border:1px solid var(--bdr);border-radius:14px;padding:20px;max-width:340px;width:100%;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto;}
.mtit{font-family:"Black Han Sans",sans-serif;font-size:18px;color:var(--gold);text-align:center;}
.mbody{font-size:14px;line-height:1.7;text-align:center;color:var(--text);}
.mcards{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.mcard{width:58px;height:82px;border-radius:7px;overflow:hidden;border:2px solid #555;}
.mcard img{width:100%;height:100%;object-fit:cover;}
.mbtns{display:flex;flex-direction:column;gap:8px;}

/* PASS */
#sp{align-items:center;justify-content:center;gap:18px;padding:40px 20px;}
.ptit{font-family:"Black Han Sans",sans-serif;font-size:26px;color:var(--gold);text-align:center;}
.psub{font-size:13px;color:var(--dim);text-align:center;}

/* WIN */
#sw{align-items:center;justify-content:center;gap:16px;padding:40px 20px;background:radial-gradient(ellipse at 50% 30%,#0e2a1a,var(--bg) 70%);}
.wemb{font-size:56px;}
.wname{font-family:"Black Han Sans",sans-serif;font-size:30px;color:var(--green);text-align:center;}
.wreason{font-size:14px;color:var(--dim);text-align:center;}

/* REPLAY */
#srp{overflow-y:auto;}
.rpinner{padding:12px;display:flex;flex-direction:column;gap:10px;}
.rpe{background:var(--sf);border:1px solid var(--bdr);border-radius:10px;padding:12px;}
.rpetit{font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:6px;}
.rperow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.rmc{width:30px;height:42px;border-radius:4px;overflow:hidden;border:1px solid #555;}
.rmc img{width:100%;height:100%;object-fit:cover;}

/* toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 16px;border-radius:18px;font-size:13px;z-index:300;pointer-events:none;}
</style>
</head>
<body>

<!-- TITLE -->
<div class="screen active" id="st">
  <div class="tem"><img id="logoimg"></div>
  <div><div class="tmain">참·거짓</div><div class="tsub">BLUFF DUEL</div></div>
  <div class="sbox">
    <div class="slbl">인원 수</div>
    <div class="row">
      <button class="nbtn" onclick="adjP(-1)">−</button>
      <span class="nval" id="pnum">2</span>
      <button class="nbtn" onclick="adjP(1)">+</button>
      <span style="font-size:12px;color:var(--dim)">명 (2~6)</span>
    </div>
    <div class="slbl">플레이어 이름</div>
    <div class="plist" id="plist"></div>
    <div class="slbl">게임 모드</div>
    <select id="gmode">
      <option value="classic">🎴 클래식</option>
      <option value="hardcore">💀 하드코어 (주화 5개)</option>
      <option value="chaos">🌀 카오스 (조커 4장)</option>
      <option value="highroller">💰 하이롤러 (주화 20개)</option>
    </select>
  </div>
  <button class="btn" onclick="showMultiLobby()" style="max-width:360px;width:100%;background:var(--blue);color:#fff;margin-bottom:-4px;">🌐 온라인 멀티플레이</button>
<button class="btn" onclick="startGame()" style="max-width:360px;width:100%;">📱 로컬 플레이 (기기 전달)</button>
</div>

<!-- GAME -->
<div class="screen" id="sg">
  <div class="gtop">
    <span class="gtit">참·거짓 DUEL</span>
    <span class="rlbl" id="rlbl"></span>
    <span class="timer" id="tdsp">—</span>
    <button class="btn sec" onclick="showScreen('srp');buildReplay()" style="width:auto;padding:6px 10px;font-size:11px;">리플레이</button>
  </div>
  <div class="gi">
    <div id="opzone"></div>
    <div class="tbox" id="tbox" style="display:none">
      <div class="tlbl">테이블</div>
      <div class="tcards" id="tcards"></div>
      <div class="tclaim" id="tclaim"></div>
    </div>
    <div class="logbox" id="logbox"></div>
    <div class="mybox">
      <div class="myhead"><span id="myname">—</span><span class="mycoins" id="mycoins"></span></div>
      <div class="hand" id="myhand"></div>
      <div class="seli" id="seli"></div>
    </div>
    <div class="actbox" id="actbox"></div>
  </div>
</div>

<!-- PASS -->
<div class="screen" id="sp">
  <div class="ptit">📱 기기 전달</div>
  <div class="psub" id="psub"></div>
  <div class="psub" style="font-size:11px;margin-top:4px;">화면을 가리고 전달하세요</div>
  <button class="btn" style="max-width:260px;" onclick="resumePass()">준비 완료 ▶</button>
</div>

<!-- WIN -->
<div class="screen" id="sw">
  <div class="wemb">🏆</div>
  <div class="wname" id="wname"></div>
  <div class="wreason" id="wreason"></div>
  <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px;margin-top:8px;">
    <button class="btn" onclick="showScreen('srp');buildReplay()">🎬 리플레이</button>
    <button class="btn sec" onclick="showScreen('st');initUI()">처음으로</button>
  </div>
</div>

<!-- REPLAY -->
<div class="screen" id="srp">
  <div class="gtop">
    <span class="gtit">🎬 리플레이</span>
    <button class="btn sec" onclick="showScreen('sg')" style="width:auto;padding:6px 10px;font-size:11px;">닫기</button>
  </div>
  <div class="rpinner" id="rpbody"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="mbox">
    <div class="mtit" id="mtit"></div>
    <div class="mbody" id="mbody"></div>
    <div class="mcards" id="mcards"></div>
    <div class="mbtns" id="mbtns"></div>
  </div>
</div>

function imgSrc(s,n){
  const k=s+'_'+String(n).padStart(2,'0');
  if(IMGS[k])return IMGS[k];
  for(const d of[1,-1,2,-2]){const k2=s+'_'+String(n+d).padStart(2,'0');if(IMGS[k2])return IMGS[k2];}
  return '';
}

  G.log.unshift({msg,cls});if(G.log.length>30)G.log.pop();
  const el=document.getElementById('logbox');if(!el)return;
  el.innerHTML='';G.log.slice(0,5).forEach(e=>{const d=document.createElement('div');d.className='loge'+(e.cls?' '+e.cls:'');d.textContent=e.msg;el.appendChild(d);});
}

// ── STATE ──
const SUITS=['truth','bluff','crown','bet'];
let G={};

// ── INIT ──
function initUI(){
  document.getElementById('logoimg').src=IMGS['joker_bluff']||'';
  adjP(0);
}
function adjP(d){
  const el=document.getElementById('pnum');
  let n=Math.min(6,Math.max(2,(parseInt(el.textContent)||2)+d));
  el.textContent=n;
  const pl=document.getElementById('plist');pl.innerHTML='';
  for(let i=0;i<n;i++){
    const r=document.createElement('div');r.style.cssText='display:flex;gap:6px;align-items:center;';
    const inp=document.createElement('input');inp.type='text';inp.placeholder=`플레이어 ${i+1}`;inp.id=`pn${i}`;
    r.appendChild(inp);pl.appendChild(r);
  }
}

// ── START GAME ──
function startGame(){
  const n=parseInt(document.getElementById('pnum').textContent);
  const mode=document.getElementById('gmode').value;
  const names=Array.from({length:n},(_,i)=>document.getElementById(`pn${i}`).value.trim()||`P${i+1}`);
  const coins=mode==='hardcore'?5:mode==='highroller'?20:10;
  let deck=[];
  for(const s of SUITS)for(let num=1;num<=13;num++)deck.push({s,num,joker:false});
  const nJokers=mode==='chaos'?4:2;
  for(let j=0;j<nJokers;j++)deck.push({s:'joker',num:0,joker:true,jbluff:j%2===0});
  shuffle(deck);
  const pp=Math.floor(deck.length/n);
  G={
    players:names.map((nm,i)=>({name:nm,coins,hand:deck.slice(i*pp,(i+1)*pp),firstTurn:true})),
    cur:0, round:1, log:[],
    table:null,
    discard:[],   // 버림더미 — 판정 시 진 사람이 전부 가져감
    lastBluff:false,
    replay:[],
    timerInt:null,
    passCb:null
  };
  showScreen('sg');
  doPass(()=>myTurn());
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

// ── TIMER ──
let _timerSec=0;
function startTimer(s,cb){
  stopTimer();_timerSec=s;
  const el=document.getElementById('tdsp');el.textContent=s;el.className='timer';
  G.timerInt=setInterval(()=>{
    _timerSec--;el.textContent=_timerSec;
    if(_timerSec<=5)el.className='timer warn';
    if(_timerSec<=0){stopTimer();cb&&cb();}
  },1000);
}
function stopTimer(){
  clearInterval(G.timerInt);G.timerInt=null;
  const el=document.getElementById('tdsp');if(el){el.textContent='—';el.className='timer';}
}

// ── PASS ──
function doPass(cb){
  G.passCb=cb;
  document.getElementById('psub').textContent=G.players[G.cur].name+'의 차례';
  showScreen('sp');
}
function resumePass(){showScreen('sg');const cb=G.passCb;G.passCb=null;if(cb)cb();}

// ── RENDER ──
function renderGame(){
  const me=G.players[G.cur];
  document.getElementById('myname').textContent=me.name;
  document.getElementById('mycoins').textContent='🪙'.repeat(Math.min(me.coins,10))+(me.coins>10?`(${me.coins})`:'');
  document.getElementById('rlbl').textContent=`R${G.round}`;
  // opponents
  const oz=document.getElementById('opzone');oz.innerHTML='';
  G.players.forEach((p,i)=>{
    if(i===G.cur)return;
    const d=document.createElement('div');d.className='opbox';
    const h=document.createElement('div');h.className='ophead';
    h.innerHTML=`<span>${p.name}</span><span>🪙${p.coins} · ${p.hand.length}장</span>`;
    d.appendChild(h);
    const cc=document.createElement('div');cc.className='opcards';
    p.hand.forEach(()=>{const c=document.createElement('div');c.className='cback';const img=document.createElement('img');img.src=backSrc();c.appendChild(img);cc.appendChild(c);});
    d.appendChild(cc);oz.appendChild(d);
  });
  // table
  if(G.table){
    document.getElementById('tbox').style.display='';
    const tc=document.getElementById('tcards');tc.innerHTML='';
    G.table.cards.forEach(()=>{const c=document.createElement('div');c.className='cback';const img=document.createElement('img');img.src=backSrc();c.appendChild(img);tc.appendChild(c);});
    document.getElementById('tclaim').textContent=`"${G.table.claim}" · ${G.table.cards.length}장 · ${G.players[G.table.playerIdx].name} 제출 | 버림더미 ${G.discard.length}장`;
  } else {
    document.getElementById('tbox').style.display='none';
  }
  renderHand();
}

function renderHand(){
  const me=G.players[G.cur];
  const el=document.getElementById('myhand');el.innerHTML='';
  me.hand.forEach((c,i)=>{
    const d=document.createElement('div');d.className='card';
    if(me._sel&&me._sel.includes(i))d.classList.add('sel');
    const img=document.createElement('img');img.src=cardSrc(c);d.appendChild(img);
    d.onclick=()=>{
      if(!me._sel)me._sel=[];
      const ix=me._sel.indexOf(i);
      if(ix>=0)me._sel.splice(ix,1);
      else if(me._sel.length<6)me._sel.push(i);
      renderHand();
    };
    el.appendChild(d);
  });
  const sel=(me._sel||[]).length;
  document.getElementById('seli').textContent=sel>0?`${sel}장 선택됨 (2~6장)`:' ';
}

// ── MY TURN ──
function myTurn(){
  const me=G.players[G.cur];
  me._sel=[];
  G._declaredNum=null;
  renderGame();
  const act=document.getElementById('actbox');act.innerHTML='';

  // 판단 턴: 다른 사람이 제출한 카드가 테이블에 있을 때
  if(G.table && G.table.playerIdx!==G.cur){
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:13px;color:var(--dim);text-align:center;padding:4px;';
    lbl.textContent=`${G.players[G.table.playerIdx].name}의 제출 — 참 또는 거짓?`;
    act.appendChild(lbl);
    const row=document.createElement('div');row.className='brow';
    const tb=document.createElement('button');tb.className='btn grn';tb.textContent='✅ 참';
    const fb=document.createElement('button');fb.className='btn red';fb.textContent='❌ 거짓!';
    if(G.lastBluff){fb.disabled=true;fb.style.opacity='.35';}
    tb.onclick=()=>doTruth();
    fb.onclick=()=>doCallBluff();
    row.appendChild(tb);row.appendChild(fb);act.appendChild(row);
    startTimer(30,()=>doTruth());

  } else {
    // 제출 턴
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:13px;color:var(--dim);text-align:center;padding:4px;';
    lbl.textContent='카드 2~6장 선택 → 숫자 선언 → 제출';
    act.appendChild(lbl);
    // 숫자 선택
    const ns=document.createElement('div');ns.className='numsel';
    for(let n=1;n<=13;n++){
      const b=document.createElement('button');b.className='nsbtn';b.textContent=n;
      b.onclick=()=>{document.querySelectorAll('.nsbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');G._declaredNum=n;};
      ns.appendChild(b);
    }
    act.appendChild(ns);
    const sub=document.createElement('button');sub.className='btn';sub.textContent='카드 제출 ▶';
    sub.onclick=()=>doSubmit();
    act.appendChild(sub);
    startTimer(60,()=>{
      // 자동 제출
      if(me.hand.length>=2){me._sel=[0,1];G._declaredNum=me.hand[0].joker?1:me.hand[0].num;doSubmit();}
    });
  }
}

// ── 제출 ──
function doSubmit(){
  const me=G.players[G.cur];
  const sel=me._sel||[];
  if(sel.length<2||sel.length>6){toast('카드 2~6장을 선택하세요');return;}
  if(!G._declaredNum){toast('선언할 숫자를 선택하세요');return;}
  stopTimer();
  // 선택 카드를 손패에서 즉시 꺼냄 (내림차순 splice)
  const sorted=[...sel].sort((a,b)=>b-a);
  const cards=sorted.map(i=>me.hand.splice(i,1)[0]);
  const actualBluff=cards.some(c=>!c.joker&&c.num!==G._declaredNum);
  G.table={cards, claim:G._declaredNum, playerIdx:G.cur, actualBluff};
  G.replay.push({type:'submit',player:me.name,cards:[...cards],claim:G._declaredNum,actualBluff});
  addLog(`${me.name}: "${G._declaredNum}" ${cards.length}장 제출`,'act');
  G.lastBluff=false;
  nextCur();
  doPass(()=>myTurn());
}

// ── 참 ──
function doTruth(){
  stopTimer();
  G.lastBluff=false;
  // 참 통과 — 테이블 카드 버림더미에 누적
  if(G.table) G.discard.push(...G.table.cards);
  G.replay.push({type:'truth',player:G.players[G.cur].name});
  addLog(`${G.players[G.cur].name}: 참으로 통과 — 버림더미 ${G.discard.length}장`);
  G.table=null;
  advanceTurn();
}

// ── 거짓 외침 ──
function doCallBluff(){
  stopTimer();
  G.lastBluff=true;
  const callerIdx=G.cur;         // B: 거짓 외친 사람
  const submIdx=G.table.playerIdx; // A: 제출한 사람
  addLog(`${G.players[callerIdx].name}: 거짓! 외침`,'bl');
  G.replay.push({type:'bluff',player:G.players[callerIdx].name});
  // A의 선택을 위해 A에게 기기 넘김
  G.cur=submIdx;
  doPass(()=>showAChoice(submIdx, callerIdx));
}

// ── A의 선택 ──
function showAChoice(aIdx, bIdx){
  openModal();
  const A=G.players[aIdx],B=G.players[bIdx];
  document.getElementById('mtit').textContent='🃏 당신의 선택';
  document.getElementById('mbody').innerHTML=`<b>${B.name}</b>이(가) 거짓을 외쳤습니다.<br>어떻게 하시겠어요?`;
  document.getElementById('mcards').innerHTML='';
  const btns=document.getElementById('mbtns');btns.innerHTML='';
  const rb=document.createElement('button');rb.className='btn';rb.textContent='즉시 공개';
  rb.onclick=()=>{closeModal();doReveal(aIdx,bIdx,false,0);};
  const cb=document.createElement('button');cb.className='btn sec';cb.textContent='되묻기 🪙1~2개';
  cb.onclick=()=>{closeModal();showCounterBet(aIdx,bIdx);};
  btns.appendChild(rb);btns.appendChild(cb);
}

// ── 되묻기 ──
function showCounterBet(aIdx,bIdx){
  openModal();
  document.getElementById('mtit').textContent='💰 되묻기';
  document.getElementById('mbody').innerHTML='"정말 내가 거짓이라고 생각해?"<br>주화 몇 개를 거시겠어요?';
  document.getElementById('mcards').innerHTML='';
  const btns=document.getElementById('mbtns');btns.innerHTML='';
  const row=document.createElement('div');row.className='brow';
  [1,2].forEach(amt=>{
    const b=document.createElement('button');b.className='btn';b.textContent=`🪙 ${amt}개`;
    b.onclick=()=>{
      closeModal();
      G.players[aIdx].coins-=amt;
      // B에게 기기 넘김
      G.cur=bIdx;
      doPass(()=>showBChoice(aIdx,bIdx,amt));
    };
    row.appendChild(b);
  });
  btns.appendChild(row);
}

// ── B의 선택 ──
function showBChoice(aIdx,bIdx,amt){
  openModal();
  const B=G.players[bIdx];
  document.getElementById('mtit').textContent='🤔 철회 or 확신?';
  document.getElementById('mbody').innerHTML=`상대가 🪙${amt}개를 걸었습니다.<br>계속 거짓을 주장하시겠어요?`;
  document.getElementById('mcards').innerHTML='';
  const btns=document.getElementById('mbtns');btns.innerHTML='';
  const row=document.createElement('div');row.className='brow';
  const wb=document.createElement('button');wb.className='btn sec';wb.textContent='철회';
  wb.onclick=()=>{
    closeModal();
    G.players[aIdx].coins+=amt; // 주화 반환
    // 철회 — 테이블 카드 버림더미에 누적
    if(G.table) G.discard.push(...G.table.cards);
    addLog(`${B.name}: 거짓 철회 — 버림더미 ${G.discard.length}장`);
    G.replay.push({type:'withdraw',player:B.name});
    G.table=null;
    G.cur=bIdx;
    advanceTurn();
  };
  const cfb=document.createElement('button');cfb.className='btn red';cfb.textContent=`확신 🪙${amt}`;
  cfb.onclick=()=>{
    closeModal();
    G.players[bIdx].coins-=amt;
    G.replay.push({type:'confirm',player:B.name,amount:amt});
    doReveal(aIdx,bIdx,true,amt);
  };
  row.appendChild(wb);row.appendChild(cfb);btns.appendChild(row);
}

// ── 공개 ──
function doReveal(aIdx,bIdx,wasBet,betAmt){
  const tableCards=[...G.table.cards];   // 카드 복사본 (G.table 무효화 전에 저장)
  const tableClaim=G.table.claim;
  const isBluff=G.table.actualBluff;
  const A=G.players[aIdx], B=G.players[bIdx];

  openModal();
  document.getElementById('mtit').textContent='🔍 카드 공개!';
  document.getElementById('mbody').innerHTML=isBluff
    ?`<span style="color:var(--red)">거짓이었습니다!</span><br>실제: ${tableCards.map(c=>c.joker?'조커':c.num).join(', ')}`
    :`<span style="color:var(--green)">참말이었습니다!</span><br>실제: ${tableCards.map(c=>c.joker?'조커':c.num).join(', ')}`;
  const mc=document.getElementById('mcards');mc.innerHTML='';
  tableCards.forEach(c=>{
    const d=document.createElement('div');d.className='mcard';
    const img=document.createElement('img');img.src=cardSrc(c);
    d.appendChild(img);mc.appendChild(d);
  });
  const btns=document.getElementById('mbtns');btns.innerHTML='';
  const ok=document.createElement('button');ok.className='btn';ok.textContent='확인';
  ok.onclick=()=>{
    closeModal();
    // 테이블 초기화
    G.table=null;

    if(isBluff){
      // B 맞음 — A(제출자) 패배: 주화 손실 + 카드 전부 먹음
      if(wasBet) A.coins-=betAmt;
      // 첫 턴 패널티: 더미 앞 카드 1장 추가
      if(A.firstTurn && G.deckExtra && G.deckExtra.length>0){
        tableCards.push(G.deckExtra.pop());
        addLog(`패널티: ${A.name} 카드 1장 추가`,'bl');
      }
      // 테이블 카드 + 버림더미 전부 A가 가져감
      const allCards=[...tableCards,...G.discard];
      G.discard=[];
      A.hand.push(...allCards);
      addLog(`판정: ${A.name} 거짓 적발${wasBet?` 🪙${betAmt} 손실`:''} — 카드 ${allCards.length}장 먹음!`,'bl');
    } else {
      // A 맞음 — B(거짓 외친 사람) 패배: 주화 손실 + 카드 전부 먹음
      if(wasBet) B.coins-=betAmt;
      // 테이블 카드 + 버림더미 전부 B가 가져감
      const allCards=[...tableCards,...G.discard];
      G.discard=[];
      B.hand.push(...allCards);
      addLog(`판정: ${A.name} 참말${wasBet?` — ${B.name} 🪙${betAmt} 손실`:''} — ${B.name} 카드 ${allCards.length}장 먹음!`,'wi');
    }
    G.replay.push({type:'reveal',isBluff,cards:tableCards,claim:tableClaim});
    G.cur=bIdx;
    advanceTurn();
  };
  btns.appendChild(ok);
}

// ── 테이블 카드 버림/이동은 doReveal, doTruth에서 직접 처리 ──
function removeTableCards(){ /* 미사용 */ }
function giveTableCardsTo(playerIdx){ /* 미사용 */ }

// ── 다음 cur (테이블 없이 순서 이동) ──
function nextCur(){
  let n=(G.cur+1)%G.players.length;
  let t=0;
  while(G.players[n].coins<=0&&t<G.players.length){n=(n+1)%G.players.length;t++;}
  G.cur=n;
}

// ── 턴 진행 ──
function advanceTurn(){
  // 승리 체크: 손패 소진
  const winner=G.players.find(p=>p.hand.length===0);
  if(winner){showWin(winner,'손패 소진 🎴');return;}
  // 패배 체크: 주화 0
  const active=G.players.filter(p=>p.coins>0);
  if(active.length<=1){showWin(active[0]||G.players[0],'유일한 생존자 👑');return;}
  // 첫 턴 플래그 업데이트
  G.players.forEach(p=>{p.firstTurn=false;});
  G.round++;
  // nextCur에서 이미 G.cur 세팅됨 (advanceTurn 호출 전에)
  // dead 플레이어 건너뜀
  let t=0;
  while(G.players[G.cur].coins<=0&&t<G.players.length){G.cur=(G.cur+1)%G.players.length;t++;}
  doPass(()=>myTurn());
}

// ── 승리 ──
function showWin(p,reason){
  stopTimer();
  document.getElementById('wname').textContent=p.name+' 승리!';
  document.getElementById('wreason').textContent=reason;
  showScreen('sw');
}

// ── 리플레이 ──
function buildReplay(){
  const body=document.getElementById('rpbody');body.innerHTML='';
  if(!G.replay||!G.replay.length){body.innerHTML='<div style="color:var(--dim);text-align:center;padding:40px">기록 없음</div>';return;}
  const labels={submit:'카드 제출',truth:'참 통과',bluff:'거짓 외침',withdraw:'거짓 철회',confirm:'확신',reveal:'결과 공개'};
  G.replay.forEach((ev,i)=>{
    const d=document.createElement('div');d.className='rpe';
    const t=document.createElement('div');t.className='rpetit';
    t.textContent=`#${i+1}  ${ev.player||''}  —  ${labels[ev.type]||ev.type}`;
    d.appendChild(t);
    if(ev.cards){
      const row=document.createElement('div');row.className='rperow';
      ev.cards.forEach(c=>{const m=document.createElement('div');m.className='rmc';const img=document.createElement('img');img.src=cardSrc(c);m.appendChild(img);row.appendChild(m);});
      if(ev.claim!=null){const s=document.createElement('span');s.style.cssText='font-size:12px;color:var(--dim);';s.textContent=`선언: ${ev.claim}`;row.appendChild(s);}
      if(ev.actualBluff!=null||ev.isBluff!=null){
        const bl=ev.actualBluff??ev.isBluff;
        const s=document.createElement('span');s.style.cssText=`font-size:12px;color:${bl?'var(--red)':'var(--green)'};`;
        s.textContent=bl?'거짓':'참말';row.appendChild(s);
      }
      d.appendChild(row);
    }
    body.appendChild(d);
  });
}

initUI();
</script>

    const players = snap.val() || [];
    document.getElementById('mp-player-list').innerHTML = players.map((p,i) => `<div class="pltag">${i===0?'👑 ':'👤 '}${p}</div>`).join('');
    document.getElementById('mp-start-btn').style.display = players.length >= 2 ? '' : 'none';
  });
  // 게임 시작 감지
  onValue(ref(db, `rooms/${code}/status`), snap => {
    if(snap.val() === 'playing') loadGameState(code);
  });
}

// ── 방 참가 ──
window.joinRoom = async function() {
  const name = document.getElementById('mp-name').value.trim() || 'P2';
  const code = document.getElementById('mp-join-code').value.trim().toUpperCase();
  if(!code) { toast('방 코드를 입력하세요'); return; }
  const snap = await get(ref(db, `rooms/${code}`));
  if(!snap.exists()) { toast('방을 찾을 수 없어요'); return; }
  const room = snap.val();
  if(room.status !== 'waiting') { toast('이미 시작된 게임이에요'); return; }
  const players = room.players || [];
  MP.myIdx = players.length;
  MP.roomId = code;
  MP.isHost = false;
  players.push(name);
  await update(ref(db, `rooms/${code}`), { players });
  document.getElementById('mp-code-display').textContent = code;
  document.getElementById('mp-room-info').style.display = '';
  document.getElementById('mp-waiting').style.display = '';
  document.getElementById('mp-create-btn').style.display = 'none';
  document.getElementById('mp-join-section').style.display = 'none';
  document.getElementById('mp-player-list').innerHTML = players.map((p,i) => `<div class="pltag">${i===0?'👑 ':'👤 '}${p}</div>`).join('');
  // 게임 시작 감지
  onValue(ref(db, `rooms/${code}/status`), snap => {
    if(snap.val() === 'playing') loadGameState(code);
  });
  // 플레이어 목록 업데이트
  onValue(ref(db, `rooms/${code}/players`), snap => {
    const pl = snap.val() || [];
    document.getElementById('mp-player-list').innerHTML = pl.map((p,i) => `<div class="pltag">${i===0?'👑 ':'👤 '}${p}</div>`).join('');
  });
}

// ── 게임 시작 (호스트) ──
window.startOnlineGame = async function() {
  if(!MP.isHost) return;
  const snap = await get(ref(db, `rooms/${MP.roomId}/players`));
  const players = snap.val() || [];
  // 로컬 게임 시작
  document.getElementById('mp-name').value = players[0];
  // 인원수 세팅
  document.getElementById('pnum').textContent = players.length;
  adjP(0);
  players.forEach((p,i) => {
    const el = document.getElementById(`pn${i}`);
    if(el) el.value = p;
  });
  await update(ref(db, `rooms/${MP.roomId}`), { status: 'playing' });
  showScreen('st');
  // 로컬 모드로 진행 (같은 기기 패스 방식)
  setTimeout(() => startGame(), 100);
}

// ── 게임 상태 로드 ──
function loadGameState(code) {
  showScreen('st');
  setTimeout(() => {
    const snap2 = get(ref(db, `rooms/${code}/players`)).then(s => {
      const players = s.val() || [];
      document.getElementById('pnum').textContent = players.length;
      adjP(0);
      players.forEach((p,i) => {
        const el = document.getElementById(`pn${i}`);
        if(el) el.value = p;
      });
      startGame();
    });
  }, 500);
}

// ── 멀티 로비 초기화 ──
window.showMultiLobby = function() {
  document.getElementById('mp-lobby').style.display = 'flex';
}
window.hideMultiLobby = function() {
  document.getElementById('mp-lobby').style.display = 'none';
}
</script>

<!-- 멀티플레이 로비 모달 -->
<div id="mp-lobby" style="display:none;position:fixed;inset:0;background:#000b;z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--sf);border:1px solid var(--bdr);border-radius:16px;padding:22px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px;">
    <div style="font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--gold);text-align:center;">🌐 온라인 멀티플레이</div>
    <input type="text" id="mp-name" placeholder="내 이름 입력" style="background:var(--cb);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:10px 12px;font-size:15px;width:100%;">
    <button class="btn" id="mp-create-btn" onclick="createRoom()">🏠 방 만들기</button>
    <div id="mp-join-section" style="display:flex;flex-direction:column;gap:8px;">
      <input type="text" id="mp-join-code" placeholder="방 코드 입력 (예: AB12CD)" style="background:var(--cb);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:10px 12px;font-size:15px;width:100%;text-transform:uppercase;letter-spacing:3px;text-align:center;">
      <button class="btn sec" onclick="joinRoom()">🚪 방 참가</button>
    </div>
    <div id="mp-room-info" style="display:none;flex-direction:column;gap:8px;">
      <div style="text-align:center;font-size:13px;color:var(--dim);">방 코드</div>
      <div id="mp-code-display" style="text-align:center;font-family:'Black Han Sans',sans-serif;font-size:32px;color:var(--gold);letter-spacing:6px;background:var(--cb);border-radius:10px;padding:12px;"></div>
      <div style="font-size:11px;color:var(--dim);text-align:center;">이 코드를 친구에게 공유하세요</div>
    </div>
    <div id="mp-waiting" style="display:none;flex-direction:column;gap:8px;">
      <div style="font-size:11px;color:var(--dim);letter-spacing:2px;">참가자</div>
      <div id="mp-player-list" style="display:flex;flex-direction:column;gap:6px;"></div>
      <button class="btn grn" id="mp-start-btn" style="display:none;" onclick="startOnlineGame()">▶ 게임 시작!</button>
    </div>
    <button class="btn sec" onclick="hideMultiLobby()">닫기</button>
  </div>
</div>

</body>
